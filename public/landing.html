<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>rzbal Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #f5f5f5;
        }
        .card {
            background: #242424;
            border: 1px solid rgba(71,71,71,0.8);
            border-radius: 14px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 0 1px rgba(255,107,74,0.045), 0 10px 26px rgba(0,0,0,0.22);
        }
        .icon {
            width: 56px; height: 56px;
            border-radius: 14px;
            background: #ff6b4a;
            display: grid;
            place-items: center;
            margin: 0 auto 20px;
            font-size: 24px;
        }
        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #a1a1aa;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(63,63,70,0.5);
            border-radius: 8px;
            padding: 6px 14px;
            margin-bottom: 16px;
        }
        h1 { font-size: 22px; margin-bottom: 8px; }
        p { color: #808080; font-size: 14px; line-height: 1.6; }
        .footer { margin-top: 24px; font-size: 11px; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 10l-4 4l6 6l4-16l-18 7l4 2l2 6l3-4"/>
            </svg>
        </div>
        <div class="badge">Telegram Mini App</div>
        <h1>rzbal Hub</h1>
        <p>This app is available exclusively inside Telegram.</p>
        <div class="footer">by Joe</div>
    </div>
</body>
</html>
