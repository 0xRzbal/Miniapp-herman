<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1a1a1a" />
    <title>rzbal Hub</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="dns-prefetch" href="//telegram.org" />
    <link rel="preconnect" href="https://telegram.org" crossorigin />
    <link rel="preload" href="/fonts/Inter-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Inter-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Inter-700.woff2" as="font" type="font/woff2" crossorigin />
    <script src="https://telegram.org/js/telegram-web-app.js" async></script>
    <script>
      (function() {
        function initTg() {
          var tg = window.Telegram && window.Telegram.WebApp;
          if (tg) {
            tg.expand();
            tg.ready();
            tg.setHeaderColor('#1a1a1a');
            tg.setBackgroundColor('#1a1a1a');
          }
        }
        initTg();
        window.addEventListener('load', initTg);
      })();
    </script>

    <style>
      @font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url('/fonts/Inter-400.woff2') format('woff2')}
      @font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url('/fonts/Inter-600.woff2') format('woff2')}
      @font-face{font-family:'Inter';font-style:normal;font-weight:700;font-display:swap;src:url('/fonts/Inter-700.woff2') format('woff2')}
      :root{--bg:#1a1a1a;--bg-card:#242424;--bg-input:#1f1f1f;--text:#f5f5f5;--text-muted:#808080;--border:rgba(71,71,71,.8);--radius:14px;--accent:#ff6b4a}
      *{box-sizing:border-box;margin:0;padding:0}
      html,body,#root{height:100%;background:#1a1a1a!important;color:#f5f5f5!important;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
      #root{display:flex;flex-direction:column}
      .app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;width:100%}
      .app-content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
      .app-content{background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:54px 54px}
      .tab-bar{display:flex;border-top:1px solid var(--border);background:rgba(26,26,26,.92);padding:4px 8px env(safe-area-inset-bottom,0);backdrop-filter:blur(12px)}
      .tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px 6px;background:none;border:none;color:var(--text-muted);font-size:10px;font-weight:600;position:relative}
      .tab-item.active{color:#f5f5f5}
      .tab-item.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:#ff6b4a;border-radius:2px}
      .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px}
      .hero-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 0 0 1px rgba(255,107,74,.045),0 10px 26px rgba(0,0,0,.22),0 0 22px rgba(255,107,74,.035)}
      .hero-card::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;background:linear-gradient(135deg,rgba(255,107,74,.42),rgba(255,79,160,.34),transparent 72%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
      .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
      .stat-item{text-align:center;padding:14px 8px;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border)}
      .quick-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
      .quick-action-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:border-color .18s,background-color .18s,box-shadow .18s,transform .18s}
      .quick-action-btn:hover{transform:translateY(-1px);border-color:rgba(255,107,74,.28);background:#282828;box-shadow:0 0 0 1px rgba(255,107,74,.08),0 12px 30px rgba(0,0,0,.24)}
      .status{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);font-weight:600}
      .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
      .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:#ff6b4a;border-radius:50%;animation:spin .7s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
      .home-ready{animation:fadeIn .4s ease both}
      @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
      #splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a1a;z-index:9999;transition:opacity .3s ease}
      #splash.hide{opacity:0;pointer-events:none}
      #splash .dot{width:8px;height:8px;background:#ff6b4a;border-radius:50%;animation:pulse 1s ease infinite}
      @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
    </style>
  </head>
  <body>
    <div id="splash"><div class="dot"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
